<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jion Github Site map</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }
    .navbar {
      display: flex;
      align-items: center;
      background-color: #333;
      color: white;
      padding: 10px 3px;
    }
    .menu-button {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    .menu-button:hover {
      color: #ccc;
    }
    .navbar h3 {
      margin: 0 0 0 10px;
      padding-top: 5px;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #444;
      color: white;
      overflow-y: auto;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
      z-index: 1001;
    }
    .sidebar.open {
      left: 0;
    }
    .sidebar button {
      display: block;
      width: 100%;
      padding: 15px 20px;
      background-color: #444;
      color: white;
      border: none;
      text-align: left;
      font-size: 16px;
      border-bottom: 1px solid #555;
      cursor: pointer;
    }
    .sidebar button:hover {
      background-color: #555;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 1000;
    }
    .overlay.active {
      display: block;
    }
    .content {
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <button class="menu-button" onclick="toggleSidebar()">☰</button>
    <h3>Jion Github site map</h3> 
  </div>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    </div>

  <div class="content">
    <h2>Jion Github</h2>
    <p>site map page</p>
    <p id="loading-msg">메뉴를 불러오는 중...</p>
  </div>

  <script>
    // ⚠️ 여기에 구글 시트에서 복사한 '웹에 게시(CSV)' URL을 넣으세요.
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYpEpmKqJaby_jQoNASKyhlX5h-I0sKat_1ccxKknSp4pP-MqDiIHetpDyBIfc0JiWRt3zV_syYfr_/pub?gid=0&single=true&output=csv';

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      if (sidebar.classList.contains("open")) {
        closeSidebar();
      } else {
        sidebar.classList.add("open");
        overlay.classList.add("active");
      }
    }

    function closeSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      sidebar.classList.remove("open");
      overlay.classList.remove("active");
    }

    function openLink(url) {
      window.location.href = url;
      closeSidebar();
    }

    // 구글 시트 데이터를 가져와서 버튼을 만드는 핵심 함수
    async function fetchSheetData() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const data = await response.text();
        
        // CSV 데이터를 줄 단위로 나누기
        const rows = data.split('\n');
        const sidebar = document.getElementById("sidebar");
        const loadingMsg = document.getElementById("loading-msg");

        // 기존 사이드바 내용 비우기
        sidebar.innerHTML = '';

        // 첫 번째 줄(헤더)을 제외하고 한 줄씩 처리
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i].split(',');
          if (row.length >= 2) {
            const name = row[0].trim();
            const link = row[1].trim();

            if (name && link) {
              const btn = document.createElement('button');
              btn.innerHTML = `${name} ⧉`;
              btn.onclick = () => openLink(link);
              sidebar.appendChild(btn);
            }
          }
        }
        loadingMsg.style.display = 'none';
      } catch (error) {
        console.error('데이터를 불러오지 못했습니다:', error);
        document.getElementById("loading-msg").innerText = "메뉴를 불러오지 못했습니다.";
      }
    }

    // 페이지가 로드될 때 데이터 가져오기 실행
    window.onload = fetchSheetData;
  </script>
</body>
</html>
