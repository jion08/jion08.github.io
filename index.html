<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jion Github Site map</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      background-color: #ffffff;
    }
    .navbar {
      display: flex;
      align-items: center;
      background-color: #333;
      color: white;
      padding: 10px 3px;
    }
    .menu-button {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    .menu-button:hover {
      color: #ccc;
    }
    .navbar h3 {
      margin: 0 0 0 10px;
      padding-top: 5px;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: #444;
      color: white;
      overflow-y: auto;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
      z-index: 1001;
    }
    .sidebar.open {
      left: 0;
    }
    .sidebar button {
      display: block;
      width: 100%;
      padding: 15px 20px;
      background-color: #444;
      color: white;
      border: none;
      text-align: left;
      font-size: 16px;
      border-bottom: 1px solid #555;
      cursor: pointer;
    }
    .sidebar button:hover {
      background-color: #555;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 1000;
    }
    .overlay.active {
      display: block;
    }

    /* --- 7개 원형 카드 애니메이션 메인 배너 스타일 --- */
    
    .content {
      padding: 20px;
      min-height: calc(100vh - 50px);
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #loading-msg {
      position: absolute;
      top: 10px;
      left: 20px;
      margin: 0;
      color: #999;
      font-size: 13px;
    }

    /* 애니메이션 구역 전체 컨테이너 */
    .banner-center-zone {
      position: relative;
      width: 100%;
      max-width: 1000px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 정중앙 Jion studio 타이틀 */
    .center-title {
      font-size: 56px;
      font-weight: 900;
      color: #111111;
      letter-spacing: -1px;
      z-index: 5;
      text-align: center;
      pointer-events: none; /* 글자가 카드 클릭을 방해하지 않도록 설정 */
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    /* 공통 카드 스타일 (원형 및 스크린샷 꽉 차게 설정) */
    .sub-site-card {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease, z-index 0.1s;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.06);
      background-color: #f7f7f7;
    }
    
    .sub-site-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 이미지가 원에 꽉 차도록 잘라줌 */
    }

    .sub-site-card:hover {
      transform: scale(1.1) !important;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.22);
      z-index: 50;
    }

    /* 개별 카드 위치, 크기 및 애니메이션 지정 */
    
    /* 1. 날씨 정보 카드 */
    .card-weather {
      width: 150px; height: 150px; top: 5%; left: 8%;
      animation: flyTL 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float1 4s ease-in-out infinite alternate 1.2s;
    }
    /* 2. 수강신청 연습 카드 */
    .card-course {
      width: 170px; height: 170px; top: 8%; right: 5%;
      animation: flyTR 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float2 4.5s ease-in-out infinite alternate 1.4s;
    }
    /* 3. 양면 인쇄 매니저 카드 */
    .card-print {
      width: 140px; height: 140px; top: 40%; left: 2%;
      animation: flyL 1.1s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float3 3.8s ease-in-out infinite alternate 1.1s;
    }
    /* 4. 수하물 찾는 곳 카드 */
    .card-baggage {
      width: 160px; height: 160px; bottom: 5%; left: 10%;
      animation: flyBL 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float4 4.2s ease-in-out infinite alternate 1.5s;
    }
    /* 5. 나의 식물 관리 카드 */
    .card-plant {
      width: 150px; height: 150px; bottom: 8%; right: 12%;
      animation: flyBR 1.3s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float5 4.8s ease-in-out infinite alternate 1.3s;
    }
    /* 6. 방문자 통계 카드 */
    .card-visit {
      width: 135px; height: 135px; top: 42%; right: 2%;
      animation: flyR 1.6s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float6 3.6s ease-in-out infinite alternate 1.6s;
    }
    /* 7. 가사 입력 카드 */
    .card-lyrics {
      width: 145px; height: 145px; top: -5%; left: 42%;
      animation: flyT 1.3s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                 float7 4.1s ease-in-out infinite alternate 1.3s;
    }

    /* --- 등장 애니메이션 키프레임 (사방에서 화면 밖 투입) --- */
    @keyframes flyTL { 0% { opacity: 0; transform: translate(-250px, -250px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }
    @keyframes flyTR { 0% { opacity: 0; transform: translate(250px, -250px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }
    @keyframes flyL  { 0% { opacity: 0; transform: translate(-300px, 0px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }
    @keyframes flyR  { 0% { opacity: 0; transform: translate(300px, 0px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }
    @keyframes flyBL { 0% { opacity: 0; transform: translate(-250px, 250px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }
    @keyframes flyBR { 0% { opacity: 0; transform: translate(250px, 250px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }
    @keyframes flyT  { 0% { opacity: 0; transform: translate(0px, -250px) scale(0.5); } 100% { opacity: 1; transform: translate(0,0) scale(1); } }

    /* --- 각기 다른 리듬의 자석 물리 효과 (둥둥 뜨기) --- */
    @keyframes float1 { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-12px) rotate(2deg); } }
    @keyframes float2 { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(14px) rotate(-1.5deg); } }
    @keyframes float3 { 0% { transform: translateX(0px) translateY(0px); } 100% { transform: translateX(-8px) translateY(-8px); } }
    @keyframes float4 { 0% { transform: translateY(0px); } 100% { transform: translateY(-15px); } }
    @keyframes float5 { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(11px) rotate(2.5deg); } }
    @keyframes float6 { 0% { transform: translateX(0px); } 100% { transform: translateX(8px) translateY(-6px); } }
    @keyframes float7 { 0% { transform: translateY(0px); } 100% { transform: translateY(10px); } }

    /* 📱 모바일 디바이스 반응형 레이아웃 처리 */
    @media (max-width: 768px) {
      .center-title { font-size: 38px; width: 100%; margin-bottom: 25px; }
      .banner-center-zone {
        height: auto;
        min-height: 700px;
        flex-wrap: wrap;
        justify-content: center;
        align-content: center;
        gap: 15px;
        padding: 20px 0;
      }
      .sub-site-card {
        position: relative;
        top: auto !important; left: auto !important; right: auto !important; bottom: auto !important;
        width: 105px; height: 105px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      }
      /* 모바일에서는 간단하게 사방 둥둥 뜨기 공통화 */
      .sub-site-card { animation: float1 4s ease-in-out infinite alternate !important; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <button class="menu-button" onclick="toggleSidebar()">☰</button>
    <h3>Jion Github site map</h3> 
  </div>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar"></div>

  <div class="content">
    <p id="loading-msg"> </p>

    <div class="banner-center-zone">
      
      <div class="center-title">Jion studio</div>

      <a href="하위_사이트_링크_1" class="sub-site-card card-weather">
        <img src="https://i.postimg.cc/wTfc06q2/IMG-1390.jpg" alt="날씨 정보">
      </a>

      <a href="하위_사이트_링크_2" class="sub-site-card card-course">
        <img src="https://i.postimg.cc/ncRY0HFk/IMG-1391.jpg" alt="수강신청 연습">
      </a>

      <a href="하위_사이트_링크_3" class="sub-site-card card-print">
        <img src="https://i.postimg.cc/Yqnfbprd/IMG-1389.jpg" alt="양면 인쇄 매니저">
      </a>

      <a href="하위_사이트_링크_4" class="sub-site-card card-baggage">
        <img src="https://i.postimg.cc/52X5rZy5/IMG-1387.jpg" alt="수하물 찾는 곳">
      </a>

      <a href="하위_사이트_링크_5" class="sub-site-card card-plant">
        <img src="https://i.postimg.cc/6p8VPDqC/IMG-1388.jpg" alt="나의 식물 관리">
      </a>

      <a href="하위_사이트_링크_6" class="sub-site-card card-visit">
        <img src="https://i.postimg.cc/fT2jBwzf/IMG-1386.jpg" alt="0129">
      </a>

      <a href="하위_사이트_링크_7" class="sub-site-card card-lyrics">
        <img src="https://i.postimg.cc/Gh7JqcLF/IMG-1385.jpg" alt="노래방">
      </a>

    </div>
  </div>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYpEpmKqJaby_jQoNASKyhlX5h-I0sKat_1ccxKknSp4pP-MqDiIHetpDyBIfc0JiWRt3zV_syYfr_/pub?gid=0&single=true&output=csv';

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      if (sidebar.classList.contains("open")) {
        closeSidebar();
      } else {
        sidebar.classList.add("open");
        overlay.classList.add("active");
      }
    }

    function closeSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      sidebar.classList.remove("open");
      overlay.classList.remove("active");
    }

    function openLink(url) {
      window.location.href = url;
      closeSidebar();
    }

    async function fetchSheetData() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const data = await response.text();
        
        const rows = data.split('\n');
        const sidebar = document.getElementById("sidebar");
        const loadingMsg = document.getElementById("loading-msg");

        sidebar.innerHTML = '';

        for (let i = 1; i < rows.length; i++) {
          const row = rows[i].split(',');
          if (row.length >= 2) {
            const name = row[0].trim();
            const link = row[1].trim();

            if (name && link) {
              const btn = document.createElement('button');
              btn.innerHTML = `${name} ⧉`;
              btn.onclick = () => openLink(link);
              sidebar.appendChild(btn);
            }
          }
        }
        loadingMsg.style.display = 'none';
      } catch (error) {
        console.error('데이터를 불러오지 못했습니다:', error);
        document.getElementById("loading-msg").innerText = "메뉴를 불러오지 못했습니다.";
      }
    }

    window.onload = fetchSheetData;
  </script>
</body>
</html>
